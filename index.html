<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayda Auto-Processor Pro</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        @font-face {
            font-family: 'Nyala';
            src: url('Nyala.ttf');
        }
        body { font-family: 'Nyala', sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .box { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 500px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-top: 20px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        label { font-weight: bold; font-size: 14px; color: #555; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .btn { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn:active { background: #0056b3; }
        #status { color: #d35400; font-size: 14px; margin: 10px 0; text-align: center; font-weight: bold; }
        canvas { width: 100%; border-radius: 10px; margin-top: 15px; display: none; border: 1px solid #ccc; }
        .download-btn { background: #28a745; display: none; }
        .preview-img { width: 100%; border-radius: 10px; margin-top: 10px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2>ፋይዳ አውቶ-ማዘጋጃ</h2>
    
    <label>የቁም መታወቂያውን ይጫኑ (Portrait ID):</label>
    <input type="file" id="idInput" accept="image/*">
    
    <div id="status">ለመጀመር ምስል ይምረጡ...</div>
    
    <label>ሙሉ ስም (Name):</label>
    <input type="text" id="name" placeholder="እዚህ ጋር ስም ይሞላል">
    
    <label>የትውልድ ቀን (DOB):</label>
    <input type="text" id="dob" placeholder="ቀን">
    
    <label>የፋይዳ ቁጥር (FAN):</label>
    <input type="text" id="fan" placeholder="የካርድ ቁጥር">
    
    <button class="btn" id="processBtn">መረጃ አንብብና አዘጋጅ</button>
    
    <canvas id="idCanvas"></canvas>
    
    <button id="downloadBtn" class="btn download-btn">መታወቂያውን አውርድ (PNG)</button>
</div>

<script>
    const idInput = document.getElementById('idInput');
    const status = document.getElementById('status');
    const canvas = document.getElementById('idCanvas');
    const ctx = canvas.getContext('2d');
    
    // ባክግራውንድ ምስሉን መጫን
    const bgImg = new Image();
    bgImg.src = '1000123189.jpg'; 

    document.getElementById('processBtn').onclick = async () => {
        if (!idInput.files[0]) return alert("እባክህ መጀመሪያ የቁም መታወቂያውን ፎቶ ምረጥ!");
        
        status.innerText = "መረጃው እየተነበበ ነው... (እባክህ 30 ሰከንድ ታገስ)";
        const imageUrl = URL.createObjectURL(idInput.files[0]);

        // OCR ንባብ - በአማርኛ እና እንግሊዝኛ
        Tesseract.recognize(imageUrl, 'eng+amh').then(({ data: { text } }) => {
            status.innerText = "ንባብ ተጠናቋል! ምስሉ እየተዘጋጀ ነው...";
            
            // ጽሁፉን በመስመር በመስመር መከፋፈል
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 2);
            
            // 1. ስም ፍለጋ (ከ Full Name በታች ያለውን መፈለግ)
            let detectedName = "";
            for(let i=0; i < lines.length; i++) {
                if(lines[i].toLowerCase().includes("full name") || lines[i].includes("ሙሉ ስም")) {
                    detectedName = lines[i+1] || "";
                    break;
                }
            }
            // ስሙ አሁንም ካልተገኘ 2ኛው መስመር ላይ ያለውን መውሰድ
            if (!detectedName && lines.length > 2) detectedName = lines[2];
            document.getElementById('name').value = detectedName;
            
            // 2. የልደት ቀን እና FAN ፍለጋ (Regex)
            const dobMatch = text.match(/\d{2}\/\d{2}\/\d{4}/);
            const fanMatch = text.match(/\d{12,}/);
            
            if (dobMatch) document.getElementById('dob').value = dobMatch[0];
            if (fanMatch) document.getElementById('fan').value = fanMatch[0];
            
            // 3. ምስሉን መሳል መጀመር
            drawID(imageUrl);
        }).catch(err => {
            status.innerText = "ስህተት፡ መረጃውን ማንበብ አልተቻለም።";
            console.error(err);
        });
    };

    function drawID(userImgUrl) {
        // የካርዱ ስታንዳርድ መጠን
        canvas.width = 1011; 
        canvas.height = 638;
        canvas.style.display = "block";
        
        // ሀ. ባክግራውንዱን መሳል
        ctx.drawImage(bgImg, 0, 0, 1011, 638);
        
        const userImg = new Image();
        userImg.onload = function() {
            // ለ. ፎቶውን መቁረጥ (Crop) 
            // መጋጠሚያዎቹ (100, 100, 300, 400) እንደ መታወቂያው ጥራት ሊለያዩ ይችላሉ
            ctx.drawImage(userImg, 120, 110, 280, 350, 65, 180, 260, 310);
            
            // ሐ. ጽሁፎችን መጻፍ
            ctx.fillStyle = "black";
            
            // ስም (Nyala ፎንት ተጠቅሞ)
            ctx.font = "bold 35px Nyala, Arial";
            ctx.fillText(document.getElementById('name').value, 415, 140);
            
            // ልደት
            ctx.font = "28px Nyala, Arial";
            ctx.fillText(document.getElementById('dob').value, 415, 250);
            
            // ዜግነት
            ctx.fillText("ኢትዮጵያዊ / Ethiopian", 415, 470);
            
            // FAN ቁጥር
            ctx.font = "bold 24px Nyala, Arial";
            ctx.fillText("FAN: " + document.getElementById('fan').value, 80, 540);
            
            status.innerText = "መታወቂያው ዝግጁ ነው!";
            document.getElementById('downloadBtn').style.display = "block";
        };
        userImg.src = userImgUrl;
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        const name = document.getElementById('name').value || 'fayda';
        link.download = name + '_horizontal.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    };
</script>

</body>
</html>
