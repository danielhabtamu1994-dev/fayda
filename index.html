<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fayda Auto-Pro (Vercel)</title>
    <script src="https://unpkg.com/tesseract.js@v2.1.0/dist/tesseract.min.js"></script>
    <style>
        @font-face { font-family: 'Nyala'; src: url('Nyala.ttf'); }
        body { font-family: 'Nyala', sans-serif; background: #f0f2f5; padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .box { background: white; padding: 20px; border-radius: 15px; width: 95%; max-width: 500px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        .btn { background: #007bff; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        #status { color: #d35400; font-size: 14px; margin: 10px 0; }
        canvas { width: 100%; border-radius: 10px; margin-top: 15px; display: none; }
    </style>
</head>
<body>

<div class="box">
    <h2 style="text-align:center;">ፋይዳ አውቶ-ማዘጋጃ</h2>
    
    <label>1. የቁም መታወቂያውን ይጫኑ (ለመረጃ ንባብ):</label>
    <input type="file" id="idInput" accept="image/*">
    
    <div id="status">መረጃው እዚህ ጋር ይነበባል...</div>
    
    <input type="text" id="name" placeholder="ሙሉ ስም">
    <input type="text" id="dob" placeholder="የትውልድ ቀን">
    <input type="text" id="fan" placeholder="የፋይዳ ቁጥር (FAN)">
    
    <button class="btn" id="processBtn">መረጃ አንብብና አዘጋጅ</button>
    
    <canvas id="idCanvas"></canvas>
    <button id="downloadBtn" class="btn" style="background:#28a745; display:none; margin-top:10px;">መታወቂያውን አውርድ</button>
</div>

<script>
    const idInput = document.getElementById('idInput');
    const status = document.getElementById('status');
    const canvas = document.getElementById('idCanvas');
    const ctx = canvas.getContext('2d');
    
    const bgImg = new Image();
    bgImg.src = '1000123189.jpg'; 

    document.getElementById('processBtn').onclick = async () => {
        if (!idInput.files[0]) return alert("ምስል ይምረጡ");
        
        status.innerText = "መረጃው እየተነበበ ነው... (30 ሰከንድ ይጠብቁ)";
        const imageUrl = URL.createObjectURL(idInput.files[0]);

        // OCR ንባብ
        Tesseract.recognize(imageUrl, 'eng+amh').then(({ data: { text } }) => {
            status.innerText = "ንባብ ተጠናቋል!";
            
            // መረጃ መፈለጊያ (Regex)
            const fanMatch = text.match(/\d{12,}/);
            const dobMatch = text.match(/\d{2}\/\d{2}\/\d{4}/);
            
            if (fanMatch) document.getElementById('fan').value = fanMatch[0];
            if (dobMatch) document.getElementById('dob').value = dobMatch[0];
            
            // መታወቂያውን መሳል
            drawID(imageUrl);
        });
    };

    function drawID(userImgUrl) {
        canvas.width = 1011; canvas.height = 638;
        canvas.style.display = "block";
        
        ctx.drawImage(bgImg, 0, 0, 1011, 638);
        
        const userImg = new Image();
        userImg.onload = () => {
            // ፎቶውን ቆርጦ ማሳረፍ (እንደ መታወቂያው ቦታ)
            ctx.drawImage(userImg, 100, 100, 300, 400, 65, 180, 260, 310);
            
            ctx.fillStyle = "black";
            ctx.font = "bold 35px Nyala";
            ctx.fillText(document.getElementById('name').value, 415, 140);
            ctx.font = "28px Nyala";
            ctx.fillText(document.getElementById('dob').value, 415, 250);
            ctx.fillText("FAN: " + document.getElementById('fan').value, 80, 540);
            
            document.getElementById('downloadBtn').style.display = "block";
        };
        userImg.src = userImgUrl;
    }

    document.getElementById('downloadBtn').onclick = () => {
        const link = document.createElement('a');
        link.download = 'fayda_horizontal.png';
        link.href = canvas.toDataURL();
        link.click();
    };
</script>
</body>
</html>
